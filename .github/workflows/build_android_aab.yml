name: Build Android AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Create Android project
        run: flutter create --project-name thecarrier --org com.kirtagapps --platforms=android .

      - name: Set Android SDK 35
        run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/g' android/app/build.gradle

      - name: Restore fixed upload keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Get packages
        run: flutter pub get

      - name: Add AdMob Test App ID
        run: |
          python3 <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          meta = """
              <meta-data
                  android:name="com.google.android.gms.ads.APPLICATION_ID"
                  android:value="ca-app-pub-3940256099942544~3347511713"/>
          """

          if "com.google.android.gms.ads.APPLICATION_ID" not in text:
              text = text.replace("</application>", meta + "\n    </application>")
              manifest.write_text(text)
          PY

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Build release APK
        run: flutter build apk --release

      - name: Remove debug signature from AAB if exists
        run: |
          zip -d build/app/outputs/bundle/release/app-release.aab "META-INF/*" || true

      - name: Sign AAB with fixed upload key
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            build/app/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Verify AAB signature
        run: |
          jarsigner -verify -verbose -certs build/app/outputs/bundle/release/app-release.aab

      - uses: actions/upload-artifact@v4
        with:
          name: the-carrier-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - uses: actions/upload-artifact@v4
        with:
          name: the-carrier-apk
          path: build/app/outputs/flutter-apk/app-release.apk
